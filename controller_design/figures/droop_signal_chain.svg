<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 470" font-family="Georgia, 'Times New Roman', serif" font-size="14">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 z" fill="#111"/>
    </marker>
  </defs>
  <rect width="980" height="470" fill="#ffffff"/>
  <text x="490" y="28" text-anchor="middle" font-size="17" font-weight="bold">Droop channel signal chain (one of two identical channels: FC, BT)</text>

  <!-- forward power path -->
  <rect x="40" y="60" width="150" height="70" fill="none" stroke="#111" stroke-width="1.6"/>
  <text x="115" y="88" text-anchor="middle" font-weight="bold">TPS61288</text>
  <text x="115" y="108" text-anchor="middle">boost regulator</text>

  <line x1="190" y1="95" x2="330" y2="95" stroke="#111" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="260" y="86" text-anchor="middle" font-style="italic">V_out , I_out</text>

  <rect x="330" y="60" width="170" height="70" fill="none" stroke="#111" stroke-width="1.6"/>
  <text x="415" y="83" text-anchor="middle" font-weight="bold">INA253A1</text>
  <text x="415" y="101" text-anchor="middle">2 m&#8486; shunt +</text>
  <text x="415" y="119" text-anchor="middle">K_sns = 0.1 V/A</text>

  <line x1="500" y1="95" x2="610" y2="95" stroke="#111" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="555" y="86" text-anchor="middle">to VBUS</text>

  <!-- droop feedback chain -->
  <line x1="415" y1="130" x2="415" y2="185" stroke="#111" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="425" y="178" font-style="italic">V_droop = K_sns &#183; I_out</text>

  <rect x="330" y="185" width="170" height="76" fill="none" stroke="#111" stroke-width="1.6"/>
  <text x="415" y="209" text-anchor="middle" font-weight="bold">AD5443 MDAC</text>
  <text x="415" y="227" text-anchor="middle">voltage-switching mode</text>
  <text x="415" y="247" text-anchor="middle">gain g = D/4096</text>

  <line x1="330" y1="223" x2="245" y2="223" stroke="#111" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="245" y1="223" x2="245" y2="290" stroke="#111" stroke-width="1.4"/>
  <line x1="245" y1="290" x2="285" y2="290" stroke="#111" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="240" y="215" text-anchor="end">SPI &#8592; Teensy (CS_MDAC_*)</text>

  <rect x="285" y="262" width="150" height="58" fill="none" stroke="#111" stroke-width="1.6"/>
  <text x="360" y="286" text-anchor="middle" font-weight="bold">OPA197</text>
  <text x="360" y="306" text-anchor="middle">A_v = 1 + 40.2k/10k = 5.02</text>

  <line x1="435" y1="291" x2="545" y2="291" stroke="#111" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="490" y="282" text-anchor="middle" font-style="italic">V_op</text>

  <rect x="545" y="262" width="200" height="58" fill="none" stroke="#111" stroke-width="1.6"/>
  <text x="645" y="286" text-anchor="middle" font-weight="bold">FB injection</text>
  <text x="645" y="306" text-anchor="middle">R_inj = 53.6k &#8594; FB node</text>

  <!-- injection back into regulator FB -->
  <line x1="745" y1="291" x2="790" y2="291" stroke="#111" stroke-width="1.4"/>
  <line x1="790" y1="291" x2="790" y2="380" stroke="#111" stroke-width="1.4"/>
  <line x1="790" y1="380" x2="115" y2="380" stroke="#111" stroke-width="1.4"/>
  <line x1="115" y1="380" x2="115" y2="130" stroke="#111" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="452" y="372" text-anchor="middle">&#916;V_out = &#8722;(R_D1/R_inj)&#183;V_op ,&#160;&#160;R_D1/R_inj = 215k/53.6k = 4.01&#160;&#160;(FB divider R_D1 = 215k / R_D2 = 10k, V_ref = 0.6 V)</text>

  <!-- ADC tap on the V_droop node (INA253 output) -->
  <line x1="415" y1="152" x2="640" y2="152" stroke="#111" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arr)"/>
  <text x="648" y="156">Teensy ADC (FC_CURRENT / BT_CURRENT), 12-bit</text>

  <!-- result box -->
  <rect x="620" y="55" width="330" height="120" fill="none" stroke="#111" stroke-width="1.2" stroke-dasharray="6,4"/>
  <text x="785" y="80" text-anchor="middle" font-weight="bold">Resulting Thevenin source</text>
  <text x="785" y="106" text-anchor="middle" font-style="italic">V_out = V_0 &#8722; R_e(g)&#183;I_out</text>
  <text x="785" y="130" text-anchor="middle">V_0 = V_ref(1 + R_D1/R_D2 + R_D1/R_inj) = 15.91 V</text>
  <text x="785" y="152" text-anchor="middle">R_e(g) = K_sns&#183;A_v&#183;(R_D1/R_inj)&#183;g &#8804; 2.01 &#8486;</text>

  <text x="490" y="435" text-anchor="middle" font-size="13">Sources: Scale Car DC Balancer Board Schematic 2026-06-22, sheets 1&#8211;2; INA253A1IPWR / AD5443 / OPA197 datasheets.</text>
  <text x="490" y="455" text-anchor="middle" font-size="13">See controller_design/system_model.md &#167;2 for the derivation.</text>
</svg>
